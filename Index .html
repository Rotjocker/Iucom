<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول ضغط الدم · وحدات متعددة</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e0e7f0 0%, #f4f7fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }
        .converter-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px rgba(0, 30, 50, 0.2), 0 0 0 1px #c0cfde inset;
            border: 1px solid #ffffff80;
        }
        h1 {
            font-size: 2.2rem;
            color: #1a3e60;
            text-align: center;
            margin: 0 0 0.25rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .subhead {
            text-align: center;
            color: #2c5a7a;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            border-bottom: 2px dashed #9bb7d4;
            padding-bottom: 0.75rem;
        }
        .input-group {
            margin-bottom: 1.8rem;
        }
        .input-group label {
            display: block;
            font-size: 1.3rem;
            font-weight: 500;
            color: #0b3b4b;
            margin-bottom: 0.3rem;
            padding-right: 0.5rem;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            border: 2px solid #bfd4e9;
            transition: 0.2s;
            padding: 0.3rem 1.2rem;
        }
        .input-wrapper:focus-within {
            border-color: #4f8bc9;
            box-shadow: 0 0 0 4px #a3c6f0;
        }
        .input-wrapper input {
            width: 100%;
            border: none;
            padding: 0.9rem 0.5rem;
            font-size: 1.5rem;
            background: transparent;
            text-align: center;
            font-weight: 600;
            color: #022b40;
            outline: none;
        }
        .input-wrapper span {
            font-size: 1.3rem;
            color: #346792;
            padding-left: 0.5rem;
            font-weight: 500;
        }

        /* خيارات الوحدة */
        .unit-selector {
            background: #dde9f5;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 0.8rem;
            border: 1px solid #8db3d9;
        }
        .unit-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.2rem;
            background: white;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #3f7fb4;
            cursor: pointer;
            transition: 0.1s;
        }
        .unit-option input[type="radio"] {
            appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #1f5a8e;
            border-radius: 50%;
            margin-left: 0.3rem;
            position: relative;
            cursor: pointer;
        }
        .unit-option input[type="radio"]:checked {
            background: #1f5a8e;
            box-shadow: inset 0 0 0 4px white;
        }
        .unit-option label {
            cursor: pointer;
            font-weight: 500;
            color: #0a3147;
        }

        .factor-note {
            background: #e1effa;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            text-align: center;
            font-size: 1.2rem;
            color: #113448;
            margin: 1.8rem 0;
            border: 1px solid #8db3d9;
        }
        .factor-note span {
            font-weight: 700;
            background: #1f4e79;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-right: 0.5rem;
        }

        .results {
            background: #e1eef6;
            border-radius: 40px;
            padding: 1.5rem;
            margin: 2rem 0 1.2rem;
            border: 2px solid #78a5c7;
        }
        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.4rem;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #aac3db;
        }
        .result-row:last-child {
            border-bottom: none;
        }
        .result-label {
            font-weight: 600;
            color: #133f5c;
        }
        .result-value {
            font-family: 'Courier New', monospace;
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid #1b6b9e;
            direction: ltr;
            display: inline-block;
            min-width: 220px;
            text-align: center;
            font-size: 1.2rem;
        }
        .small-note {
            font-size: 1rem;
            color: #2f5777;
            text-align: center;
            background: #fefefe90;
            border-radius: 30px;
            padding: 0.3rem;
            margin-top: 0.5rem;
        }
        .btn-calc {
            background: #1f5a8e;
            border: none;
            width: 100%;
            padding: 1rem;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 0 #0e2d47, 0 6px 12px black;
            margin: 1rem 0 0.5rem;
        }
        .btn-calc:hover {
            background: #266fab;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #0e2d47, 0 8px 14px black;
        }
        .btn-calc:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0e2d47, 0 6px 10px black;
        }
        footer {
            text-align: center;
            color: #416f94;
            margin-top: 1rem;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }
        .credit {
            background: #e6d9b8;
            padding: 0.4rem 1.8rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #1d4a5f;
            border: 1px solid #b5946a;
            box-shadow: 0 2px 6px #00000020;
            display: inline-block;
        }
        .credit span {
            font-family: 'Courier New', monospace;
            margin: 0 4px;
        }
    </style>
</head>
<body>
    <div class="converter-card">
        <h1>🩺 BP Converter</h1>
        <div class="subhead">من mmHg  إلى  وحدات مختلفة</div>

        <!-- حقول الإدخال (بدون قيم افتراضية) -->
        <div class="input-group">
            <label>الضغط الانقباضي (Systolic)</label>
            <div class="input-wrapper">
                <input type="number" id="sysInput" step="any" min="0" placeholder="أدخل القيمة">
                <span>mmHg</span>
            </div>
        </div>

        <div class="input-group">
            <label>الضغط الانبساطي (Diastolic)</label>
            <div class="input-wrapper">
                <input type="number" id="diasInput" step="any" min="0" placeholder="أدخل القيمة">
                <span>mmHg</span>
            </div>
        </div>

        <!-- اختيار الوحدة الناتجة -->
        <div class="unit-selector">
            <div class="unit-option">
                <input type="radio" name="unit" id="unitDyne" value="dyne" checked>
                <label for="unitDyne">dyne/cm²</label>
            </div>
            <div class="unit-option">
                <input type="radio" name="unit" id="unitNm2" value="nm2">
                <label for="unitNm2">N/m² (باسكال)</label>
            </div>
        </div>

        <!-- معامل التحويل يتغير حسب الوحدة -->
        <div class="factor-note" id="factorNote">
            <span>1 mmHg = 1333.22 dyne/cm²</span>
        </div>

        <!-- زر الحساب -->
        <button class="btn-calc" id="calcBtn">↻ احسب</button>

        <!-- منطقة عرض النتائج -->
        <div class="results" id="resultsArea">
            <div class="result-row">
                <span class="result-label">الانقباضي:</span>
                <span class="result-value" id="sysResult">0</span>
            </div>
            <div class="result-row">
                <span class="result-label">الانبساطي:</span>
                <span class="result-value" id="diasResult">0</span>
            </div>
            <div class="small-note" id="resultUnitNote">
                (القيم بوحدة dyne/cm²)
            </div>
        </div>

        <footer>
            <div>✦ أدخل القيم، اختر الوحدة، ثم اضغط احسب ✦</div>
            <!-- نص الإجازة مصحح بالهمزة -->
            <div class="credit">✨ صُنع بإجازة <span>❤️</span> ✨</div>
        </footer>
    </div>

    <script>
        // عناصر الإدخال والعرض
        const sysInput = document.getElementById('sysInput');
        const diasInput = document.getElementById('diasInput');
        const sysResult = document.getElementById('sysResult');
        const diasResult = document.getElementById('diasResult');
        const calcBtn = document.getElementById('calcBtn');
        const unitRadios = document.getElementsByName('unit');
        const factorNote = document.getElementById('factorNote');
        const resultUnitNote = document.getElementById('resultUnitNote');

        // معاملات التحويل
        const CONVERSION_DYNE = 1333.22;      // dyne/cm² لكل mmHg
        const CONVERSION_NM2 = 133.322;       // N/m² لكل mmHg

        // دالة لتحديث نص معامل التحويل حسب الوحدة المختارة
        function updateFactorNote() {
            const unit = getSelectedUnit();
            if (unit === 'dyne') {
                factorNote.innerHTML = '<span>1 mmHg = 1333.22 dyne/cm²</span>';
                resultUnitNote.textContent = '(القيم بوحدة dyne/cm²)';
            } else {
                factorNote.innerHTML = '<span>1 mmHg = 133.322 N/m²</span>';
                resultUnitNote.textContent = '(القيم بوحدة N/m²)';
            }
        }

        // الحصول على الوحدة المختارة
        function getSelectedUnit() {
            for (const radio of unitRadios) {
                if (radio.checked) {
                    return radio.value; // 'dyne' أو 'nm2'
                }
            }
            return 'dyne'; // افتراضي
        }

        // دالة تنسيق الأرقام
        function formatValue(val) {
            if (Math.abs(val) > 1e6 || (Math.abs(val) < 0.001 && val !== 0)) {
                return val.toExponential(4);
            } else {
                if (Number.isInteger(val)) return val.toString();
                if (val > 1000) return val.toFixed(1);
                return val.toFixed(2);
            }
        }

        // دالة الحساب والعرض
        function calculateAndDisplay() {
            // قراءة القيم (إذا كانت فارغة تُعتبر 0)
            let sysVal = parseFloat(sysInput.value);
            let diasVal = parseFloat(diasInput.value);
            if (isNaN(sysVal)) sysVal = 0;
            if (isNaN(diasVal)) diasVal = 0;

            // تحديد معامل التحويل
            const unit = getSelectedUnit();
            let factor;
            if (unit === 'dyne') {
                factor = CONVERSION_DYNE;
            } else {
                factor = CONVERSION_NM2;
            }

            // إجراء التحويل
            const sysConverted = sysVal * factor;
            const diasConverted = diasVal * factor;

            // تحديث النتائج
            sysResult.textContent = formatValue(sysConverted) + (unit === 'dyne' ? ' dyne/cm²' : ' N/m²');
            diasResult.textContent = formatValue(diasConverted) + (unit === 'dyne' ? ' dyne/cm²' : ' N/m²');
        }

        // عند تغيير الوحدة (بعد اختيار radio) نقوم بتحديث النص وإعادة الحساب
        for (const radio of unitRadios) {
            radio.addEventListener('change', () => {
                updateFactorNote();
                calculateAndDisplay();
            });
        }

        // زر الحساب
        calcBtn.addEventListener('click', calculateAndDisplay);

        // الضغط على Enter في الحقول
        sysInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculateAndDisplay();
        });
        diasInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculateAndDisplay();
        });

        // عند تحميل الصفحة: تحديث المعامل وعرض 0/0 (حيث الحقول فارغة)
        window.addEventListener('load', () => {
            updateFactorNote();
            calculateAndDisplay();  // سيعرض 0 لأن الحقول فارغة
        });
    </script>
</body>
</html>
